version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: "monthly"
  cooldown:
    default-days: 2
  open-pull-requests-limit: 100
  target-branch: master
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: "monthly"
  open-pull-requests-limit: 100
  target-branch: master
